# vim:fileencoding=utf-8
# 从 wezterm/ 迁移而来；快捷键见 kitty/keybindings.md，选项说明见 kitty/configuration-zh.md
# Leader 等价：多键序列 ctrl+a>h（先 Ctrl+a，再 h），非同时按住。

# [theme]
include themes/Gruvbox-Dark-Hard.conf

# [font]
font_size 16.0
# BEGIN_KITTY_FONTS
font_family      family="Maple Mono" wght=800
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# Powerline / Nerd 等 PUA 字形（主字体缺字时 fallback）
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ed00-U+efc1,U+f000-U+f2ff,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

# [layout]
enabled_layouts splits

# [tab bar] 仅一个标签时隐藏标签栏（对应 WezTerm hide_tab_bar_if_only_one_tab）
tab_bar_min_tabs 2
# 与下方 Ctrl+a→t 的「显示」一致；若改用 powerline 等请同时改快捷键里的 -o tab_bar_style=…
#tab_bar_style fade

# [scroll]
scrollback_lines 100000

# [bells] 对应 WezTerm audible_bell Disabled
enable_audio_bell no

# [advanced]
allow_remote_control yes

# 使用更通用的终端类型，兼容远程服务器
term xterm-256color

# [clipboard]
copy_on_select yes
clipboard_control write-clipboard write-primary read-clipboard read-primary

# 多键序列超时（秒），与 WezTerm Leader 体验接近
map_timeout 2.0

# macOS：覆盖默认 ⌘+↩（new_window，在 splits 下像分屏）→ 切换全屏
map cmd+enter toggle_fullscreen

# 标签页：⌘+1…9 跳到第 N 个标签；Ctrl+a → h/l 上一标签 / 下一标签（与标签栏左右一致）
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# -----------------------------------------------------------------------------
# Leader 风格映射（等价原 WezTerm Ctrl+a 前缀）
# -----------------------------------------------------------------------------
map ctrl+a>c command_palette

map ctrl+a+[ remote_control scroll-window 0.5p-
map ctrl+a+] remote_control scroll-window 0.5p

map ctrl+a>v show_scrollback

map ctrl+a>backslash launch --cwd=current --location=vsplit
map ctrl+a>minus launch --cwd=current --location=hsplit

map ctrl+a>h previous_tab
map ctrl+a>j neighboring_window bottom
map ctrl+a>k neighboring_window top
map ctrl+a>l next_tab

# 标签栏：t 显示、d 隐藏（与上面 tab_bar_style 保持一致）
#map ctrl+a>t remote_control load-config -o tab_bar_style=fade
#map ctrl+a>d remote_control load-config -o tab_bar_style=hidden

# 与 WezTerm「Leader+r」持续调整：进入 resize 模式后再按方向 / hjkl
map --new-mode resize --timeout 5.0 ctrl+a>r
map --mode resize h resize_window narrower
map --mode resize l resize_window wider
map --mode resize k resize_window taller
map --mode resize j resize_window shorter
map --mode resize left resize_window narrower
map --mode resize right resize_window wider
map --mode resize up resize_window taller
map --mode resize down resize_window shorter
map --mode resize esc pop_keyboard_mode

# 与 WezTerm「Leader+p」短时窗格切换
map --new-mode pane_nav --timeout 1.0 ctrl+a>p
map --mode pane_nav h neighboring_window left
map --mode pane_nav j neighboring_window bottom
map --mode pane_nav k neighboring_window top
map --mode pane_nav l neighboring_window right
map --mode pane_nav left neighboring_window left
map --mode pane_nav right neighboring_window right
map --mode pane_nav up neighboring_window up
map --mode pane_nav down neighboring_window down
map --mode pane_nav esc pop_keyboard_mode
