# catppuccin/tmux v2 — source from tmux.conf before run tpm.
# All @catppuccin_* options must be set before TPM runs the theme script.
# Status line: themes/catppuccin-status-post-tpm.conf (source after run tpm).
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

#set -g status-position top
set -g status-interval 1
set -g @catppuccin_flavor "mocha" # latte, frappe, macchiato, mocha
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_background "none"
