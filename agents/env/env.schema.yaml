# 环境变量 schema：只声明名称与规则，不存放真实密钥
version: 1

variables:
  ZHIPU_API_KEY:
    purpose: "智谱 AI API Key；用于 Claude/Cursor/OpenCode 的 web MCP 鉴权"
    required: true
    sensitive: true
    profiles: [research, browser, full]
    check: present
    setup_hint: "在 ~/.envrc 或 shell 配置中 export ZHIPU_API_KEY=..."

  MINIMAX_API_KEY:
    purpose: "MiniMax API Key；Codex 与 Pi 国际站(minimax)共用"
    required: false
    sensitive: true
    profiles: [coding, research, browser, full]
    tools: [codex, pi]
    check: present
    setup_hint: "在 ~/.envrc 中 export MINIMAX_API_KEY=...；国内站请另设 MINIMAX_CN_API_KEY 或让 Pi 用 minimax-cn"

  MINIMAX_CN_API_KEY:
    purpose: "MiniMax 国内站 API Key；Pi provider=minimax-cn（api.minimaxi.com）"
    required: false
    sensitive: true
    profiles: [coding, research, browser, full]
    tools: [pi]
    check: present
    setup_hint: "国内 key 可 export MINIMAX_CN_API_KEY=\"$MINIMAX_API_KEY\"；或 auth.json 里 key 写 $MINIMAX_API_KEY"

  AGENT_ENV_BROWSER_EXECUTABLE:
    purpose: "可选：覆盖浏览器可执行文件路径"
    required: false
    sensitive: false
    profiles: [browser, full]
    check: present_if_set
    setup_hint: "仅在 local override 或环境变量中设置本机路径"

  AGENT_ENV_CDP_ENDPOINT:
    purpose: "可选：Chrome DevTools Protocol endpoint（如 http://127.0.0.1:9222）"
    required: false
    sensitive: false
    profiles: [browser, full]
    check: present_if_set
    setup_hint: "仅在显式启用 chrome-devtools provider 时设置"
