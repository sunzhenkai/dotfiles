# 环境变量 schema：只声明名称与规则，不存放真实密钥
version: 1

variables:
  ZHIPU_API_KEY:
    purpose: "智谱 AI API Key；用于 Claude/Cursor/OpenCode 的 web MCP 鉴权"
    required: true
    sensitive: true
    profiles: [research, browser, full]
    check: present
    setup_hint: "在 ~/.envrc 或 shell 配置中 export ZHIPU_API_KEY=..."

  MINIMAX_API_KEY:
    purpose: "MiniMax API Key；本库约定为国内站 key（Codex + Pi auth.json 展开）"
    required: false
    sensitive: true
    profiles: [coding, research, browser, full]
    tools: [codex, pi]
    check: present
    setup_hint: "在 ~/.envrc 中 export MINIMAX_API_KEY=...；dotf pi -c 会写入 auth.json 引用，无需再设 MINIMAX_CN_API_KEY"

  MINIMAX_CN_API_KEY:
    purpose: "可选：Pi 原生国内站 env（若未用 auth.json 的 $MINIMAX_API_KEY）"
    required: false
    sensitive: true
    profiles: [coding, research, browser, full]
    tools: [pi]
    check: present
    setup_hint: "通常不必设；需要时可 export MINIMAX_CN_API_KEY=\"$MINIMAX_API_KEY\""

  KIMI_API_KEY:
    purpose: "Kimi For Coding API Key；Pi 内置 provider kimi-coding"
    required: false
    sensitive: true
    profiles: [coding, research, browser, full]
    tools: [pi]
    check: present
    setup_hint: "在 ~/.envrc 中 export KIMI_API_KEY=...；dotf pi -c 会写入 auth.json 引用"

  AGENT_ENV_BROWSER_EXECUTABLE:
    purpose: "可选：覆盖浏览器可执行文件路径"
    required: false
    sensitive: false
    profiles: [browser, full]
    check: present_if_set
    setup_hint: "仅在 local override 或环境变量中设置本机路径"

  AGENT_ENV_CDP_ENDPOINT:
    purpose: "可选：Chrome DevTools Protocol endpoint（如 http://127.0.0.1:9222）"
    required: false
    sensitive: false
    profiles: [browser, full]
    check: present_if_set
    setup_hint: "仅在显式启用 chrome-devtools provider 时设置"
