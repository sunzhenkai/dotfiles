# agents/env 环境清单：支持工具、默认 profile、模块范围
version: 1

tools:
  - claude
  - cursor
  - opencode
  - codex
  - kimi-code
  - pi

default_profile: research

modules:
  mcp:
    enabled: true
    tools: [claude, cursor, opencode, kimi-code]
    exclude: [codex, pi]
  browser:
    enabled: true
    tools: [claude, cursor, opencode, kimi-code]
    exclude: [codex, pi]
  tools:
    enabled: true
    tools: [claude, cursor, opencode, codex, kimi-code, pi]
  env:
    enabled: true
    tools: [claude, cursor, opencode, codex, kimi-code, pi]
  security:
    enabled: true
    tools: [claude, cursor, opencode, codex, kimi-code, pi]
  agents:
    enabled: true
    tools: [claude, cursor, opencode, codex, kimi-code, pi]

# Codex / Pi 当前无稳定 MCP 配置入口，显式降级
unsupported:
  codex:
    mcp: skip
    reason: "Codex 当前无稳定 MCP 配置入口；skills/commands 仍由 agents/ 同步"
  pi:
    mcp: skip
    reason: "Pi 无内置 MCP（可用 skills/extensions）；skills/prompts 仍由 agents/ 同步"
