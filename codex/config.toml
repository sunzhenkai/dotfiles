# Codex 配置 - 接入 MiniMax（MiniMax-M3），无需 OpenAI 登录
# 文档: https://developers.openai.com/codex/config-reference
#       https://platform.minimaxi.com/document/Code%20Companion
#
# 本配置使用自定义 provider（MiniMax），不依赖 OpenAI 账号：
#   - 启动 `codex` 时不会弹出 ChatGPT 登录选择器
#     （provider 的 requires_openai_auth = false，见下方）
#   - 只需设置 MINIMAX_API_KEY 环境变量即可使用
#
# 注意: codex 0.130+ 已移除 wire_api = "chat" 支持（仅支持 Responses API）。
#       智谱 GLM Coding Plan 目前仅提供 Chat / Anthropic 协议，暂不兼容新版 codex，
#       故本配置暂不保留智谱备选（待智谱支持 /responses 端点后可恢复）。

# ============================================================
# 顶级配置（必须在任何 [table] 头之前）
# ============================================================
model = "MiniMax-M3"
model_provider = "minimax"
model_context_window = 1000000
# 模型能力目录：声明 MiniMax-M3 的多模态输入、reasoning level、工具类型等。
# 安装后位于 ~/.codex/model-catalogs/custom-catalog.json（symlink 到本仓库文件）。
# 生效后在 Codex 中输入 /model 可看到 MiniMax-M3 及其可选 reasoning level。
model_catalog_json = "~/.codex/model-catalogs/custom-catalog.json"

# 审批策略: untrusted | on-request | never
approval_policy = "on-request"
# 沙箱模式: read-only | workspace-write | danger-full-access
sandbox_mode = "workspace-write"

# 隐藏冗长的推理输出（CI 日志更清爽）
hide_agent_reasoning = true
model_reasoning_effort = "high"


name = "OneAPI"
base_url = "https://oneapi.wii.pub/v1"
env_key = "ONEAPI_API_KEY"
wire_api = "responses"
# 认证通过 env_key 从 MINIMAX_API_KEY 环境变量读取，无需在此硬编码密钥。
# wire_api = "responses"：MiniMax Code Companion 提供 Responses API 协议。
# requires_openai_auth = false：显式声明不要求 OpenAI 登录（默认即 false，
#   启动时直接跳过 ChatGPT 登录选择器）。
[model_providers.minimax]


# ============================================================name = "MiniMax"
base_url = "https://api.minimaxi.com/v1"
env_key = "MINIMAX_API_KEY"
wire_api = "responses"
requires_openai_auth = false
# 子进程环境变量策略
# ============================================================
[shell_environment_policy]
inherit = "core"

# ============================================================
# TUI 通知
# ============================================================
[tui]


notifications = ["agent-turn-complete", "approval-requested"]

# ============================================================
# projects（信任的项目列表）不在本文件管理
# ============================================================
# codex 运行时会把"首次信任的项目"以 [projects."<path>"] 形式自动写入
# ~/.codex/config.toml。这类内容机器特定、动态变化，放进本仓库会污染 git。
#
# 方案：projects 由本地文件 codex/config.local.toml 维护（已 .gitignore），
# 安装时（`dotf codex`）自动与本文件（base）合并生成 ~/.codex/config.toml。
# codex 新增的信任会在下次安装时自动回抽到 config.local.toml，不丢也不入库。
# 详见 codex/README.md「projects 本地化」一节。
