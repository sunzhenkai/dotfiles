# Codex 配置 - 默认接入 MiniMax（MiniMax-M3），同时保留智谱 GLM 作为备选
# 文档: https://developers.openai.com/codex/config-reference
#       https://platform.minimaxi.com/document/Code%20Companion
#       https://docs.bigmodel.cn/cn/coding-plan/tool/others

# ============================================================
# 顶级配置（必须在任何 [table] 头之前）
# ============================================================
# 默认使用 MiniMax-M3（1M 上下文窗口，Responses API 协议）。
# 临时切换回智谱可用: codex --model-provider zhipu --model glm-5.2
model = "MiniMax-M3"
model_provider = "minimax"
model_context_window = 1000000

# 审批策略: untrusted | on-request | never
approval_policy = "on-request"
# 沙箱模式: read-only | workspace-write | danger-full-access
sandbox_mode = "workspace-write"

# 隐藏冗长的推理输出（CI 日志更清爽）
hide_agent_reasoning = true

# ============================================================
# 自定义模型提供商 - MiniMax（默认）
# ============================================================
# 认证通过 env_key 从 MINIMAX_API_KEY 环境变量读取，无需在此硬编码密钥。
# wire_api = "responses"：MiniMax Code Companion 提供 Responses API 协议。
[model_providers.minimax]
name = "MiniMax"
base_url = "https://api.minimaxi.com/v1"
env_key = "MINIMAX_API_KEY"
wire_api = "responses"

# ============================================================
# 自定义模型提供商 - 智谱 AI（备选）
# ============================================================
# 认证通过 env_key 从 ZHIPU_API_KEY 环境变量读取，无需在此硬编码密钥。
# wire_api = "chat"：智谱当前提供的是 OpenAI Chat Completion 协议。
[model_providers.zhipu]
name = "Zhipu AI"
base_url = "https://open.bigmodel.cn/api/coding/paas/v4"
env_key = "ZHIPU_API_KEY"
wire_api = "chat"

# ============================================================
# 子进程环境变量策略
# ============================================================
[shell_environment_policy]
inherit = "core"

# ============================================================
# TUI 通知
# ============================================================
[tui]
notifications = ["agent-turn-complete", "approval-requested"]
